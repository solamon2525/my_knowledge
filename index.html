<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Knowledge Base — คลังความรู้ส่วนตัว</title>
  <meta name="description" content="คลังความรู้ส่วนตัว รวบรวมและจัดหมวดหมู่ความรู้ต่างๆ เพื่อการเรียนรู้ที่มีประสิทธิภาพ" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/index.css" />
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-color: #1e293b;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --nav-bg: rgba(255, 255, 255, 0.8);
      --hero-sub: #64748b;
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-color: #f1f5f9;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --nav-bg: rgba(15, 23, 42, 0.8);
      --hero-sub: #94a3b8;
    }

    body { background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s; }
    nav { background: var(--nav-bg) !important; backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); }
    .card { background: var(--card-bg) !important; border: 1px solid var(--card-border) !important; color: var(--text-color) !important; }
    .hero-sub { color: var(--hero-sub) !important; }
    
    /* Layout Switch Styles */
    .list-view .cards-grid { grid-template-columns: 1fr !important; }
    .list-view .card { display: flex; flex-direction: row; align-items: center; gap: 20px; padding: 15px 25px; }
    .list-view .card-header { margin-bottom: 0; }
    .list-view .card-desc { display: -webkit-box; -webkit-line-clamp: 1; margin-bottom: 0; }
    .list-view .card-footer { margin-top: 0; margin-left: auto; border-top: none; padding-top: 0; }

    .controls-group { display: flex; gap: 10px; align-items: center; }
    .control-btn { 
      background: var(--card-bg); 
      border: 1px solid var(--card-border); 
      color: var(--text-color);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    .control-btn:hover { background: var(--card-border); }
  </style>
</head>
<body data-theme="dark">
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="wrapper">
  <!-- NAVBAR -->
  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="#" class="nav-logo">
          <div class="nav-logo-icon">📚</div>
          My Knowledge
        </a>

        <div class="nav-search">
          <div class="search-wrap">
            <input
              type="search"
              class="search-box"
              id="search-input"
              placeholder="ค้นหาความรู้..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="controls-group">
          <button class="control-btn" id="theme-toggle" title="สลับโหมด มืด/สว่าง">
            <span id="theme-icon">🌙</span>
          </button>
          <button class="control-btn" id="layout-toggle" title="สลับมุมมอง Grid/List">
            <span id="layout-icon">⊞</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- HERO -->
    <section class="hero fade-in">
      <div class="hero-badge">✨ Knowledge Base v1.3</div>
      <h1>My Knowledge Base</h1>
      <p class="hero-sub">คลังความรู้ส่วนตัว รวบรวมสรุปความรู้จากแหล่งต่างๆ จัดหมวดหมู่เพื่อการค้นหาและทบทวนได้ง่าย</p>
      <div class="hero-tags" id="category-filters">
        <button class="hero-tag active" data-filter="all" id="btn-filter-all">🌐 ทั้งหมด</button>
      </div>
    </section>

    <!-- STATS -->
    <div class="stats-bar fade-in" id="stats-bar"></div>

    <!-- NO RESULTS -->
    <div id="no-results" style="display:none;">
      <div class="big-emoji">🔍</div>
      <h3>ไม่พบผลลัพธ์</h3>
      <p>ลองค้นหาด้วยคำอื่น หรือเลือกหมวดหมู่อื่น</p>
    </div>

    <!-- DYNAMIC SECTIONS -->
    <div id="knowledge-sections"></div>
  </main>

  <footer>
    <p>
      📚 My Knowledge Base &nbsp;·&nbsp;
      อัปเดตล่าสุด: <span id="last-updated"></span> &nbsp;·&nbsp;
      <a href="https://github.com/solamon2525/my_knowledge" target="_blank">GitHub ↗</a>
    </p>
  </footer>
</div>

<script src="data/knowledge_db.js"></script>
<script>
/* =====================================================
   ⚙️ ENGINE — ระบบอัตโนมัติขั้นสูง
   ===================================================== */

let currentFilter = 'all';
let currentSearch = '';
let currentLayout = 'grid';
let currentTheme = 'dark';

// ป้องกันปัญหา localStorage
try {
  currentLayout = localStorage.getItem('kb-layout') || 'grid';
  currentTheme = localStorage.getItem('kb-theme') || 'dark';
} catch (e) { console.error("LocalStorage blocked", e); }

// จัดเรียงข้อมูลทันที
if (typeof KNOWLEDGE !== 'undefined') {
  KNOWLEDGE.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function updateIcons() {
  try {
    const themeIcon = document.getElementById('theme-icon');
    const layoutIcon = document.getElementById('layout-icon');
    if (themeIcon) themeIcon.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
    if (layoutIcon) layoutIcon.textContent = currentLayout === 'grid' ? '⊞' : '〓';
  } catch (e) {}
}

function render() {
  if (typeof KNOWLEDGE === 'undefined') return;
  
  const q = currentSearch.toLowerCase().trim();
  let filtered = KNOWLEDGE.filter(item => {
    const matchCat = currentFilter === 'all' || item.category === currentFilter;
    const matchSearch = !q ||
      item.title.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) ||
      item.tags.some(t => t.toLowerCase().includes(q)) ||
      item.category.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const grouped = groupByCategory(filtered);
  const sections = document.getElementById('knowledge-sections');
  const noResults = document.getElementById('no-results');

  if (!sections) return;

  if (filtered.length === 0) {
    sections.innerHTML = '';
    if (noResults) noResults.style.display = 'block';
    return;
  }
  if (noResults) noResults.style.display = 'none';

  sections.innerHTML = Object.entries(grouped).map(([catName, cat]) => `
    <section class="category-section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon" style="background:${cat.color}22; color:${cat.color}">${cat.emoji}</div>
          ${catName}
          <span class="section-count">${cat.items.length} หัวข้อ</span>
        </div>
      </div>
      <div class="cards-grid">
        ${cat.items.map(item => cardHTML(item)).join('')}
      </div>
    </section>
  `).join('');
}

function groupByCategory(items) {
  return items.reduce((acc, item) => {
    if (!acc[item.category]) acc[item.category] = { emoji: item.emoji, color: item.color, items: [] };
    acc[item.category].items.push(item);
    return acc;
  }, {});
}

function badgeHTML(badge) {
  if (!badge) return '';
  const map = { new: ['badge-new','NEW'], hot: ['badge-hot','🔥 HOT'], update: ['badge-update','UPDATE'], star: ['badge-star','⭐ STAR'] };
  const [cls, label] = map[badge] || ['',''];
  return `<span class="badge ${cls}">${label}</span>`;
}

function cardHTML(item) {
  const q = currentSearch;
  return `
    <a class="card" href="${item.link}" ${item.link !== '#' ? 'target="_blank"' : 'onclick="return false"'} id="card-${item.id}">
      <div class="card-header">
        <div class="card-emoji">${item.emoji}</div>
        <div class="card-badges">${badgeHTML(item.badge)}</div>
      </div>
      <div class="card-title">${highlight(item.title, q)}</div>
      <div class="card-desc">${highlight(item.desc, q)}</div>
      <div class="card-footer">
        <div class="card-tags">
          ${item.tags.map(t => `<span class="card-tag">${highlight(t, q)}</span>`).join('')}
        </div>
        <div class="card-date">${formatDate(item.date)}</div>
      </div>
    </a>
  `;
}

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark class="highlight">$1</mark>');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
}

function buildFilters() {
  const container = document.getElementById('category-filters');
  if (!container || typeof KNOWLEDGE === 'undefined') return;
  
  const cats = [...new Set(KNOWLEDGE.map(k => k.category))];
  const catObj = groupByCategory(KNOWLEDGE);
  const allBtn = document.getElementById('btn-filter-all');
  
  container.innerHTML = '';
  if (allBtn) container.appendChild(allBtn);

  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'hero-tag';
    btn.innerHTML = `${catObj[cat].emoji} ${cat}`;
    btn.onclick = function() { filterCategory(cat, this); };
    container.appendChild(btn);
  });

  try {
    document.getElementById('total-count').textContent = KNOWLEDGE.length;
    document.getElementById('cat-count').textContent = cats.length;
  } catch (e) {}
}

function buildStats() {
  const bar = document.getElementById('stats-bar');
  if (!bar || typeof KNOWLEDGE === 'undefined') return;
  const cats = groupByCategory(KNOWLEDGE);
  const totalNew = KNOWLEDGE.filter(k => k.badge === 'new').length;
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-icon">📖</div>
      <div>
        <div class="stat-value">${KNOWLEDGE.length}</div>
        <div class="stat-label">หัวข้อทั้งหมด</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📂</div>
      <div>
        <div class="stat-value">${Object.keys(cats).length}</div>
        <div class="stat-label">หมวดหมู่</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✨</div>
      <div>
        <div class="stat-value">${totalNew}</div>
        <div class="stat-label">เพิ่มใหม่</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔥</div>
      <div>
        <div class="stat-value">${KNOWLEDGE.filter(k=>k.badge==='hot').length}</div>
        <div class="stat-label">กำลังฮอต</div>
      </div>
    </div>
  `;
}

function filterCategory(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.hero-tag').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function updateLastUpdated() {
  const lastUpdatedEl = document.getElementById('last-updated');
  if (!lastUpdatedEl || typeof KNOWLEDGE === 'undefined') return;
  const dates = KNOWLEDGE.map(k => k.date).filter(Boolean).sort().reverse();
  lastUpdatedEl.textContent = dates[0] ? formatDate(dates[0]) : '-';
}

function init() {
  try {
    document.body.setAttribute('data-theme', currentTheme);
    if (currentLayout === 'list') document.body.classList.add('list-view');
    updateIcons();
    buildFilters();
    buildStats();
    render();
    updateLastUpdated();
  } catch (e) { console.error("Init error", e); }
}

// ผูกเหตุการณ์ปุ่ม
document.getElementById('theme-toggle').onclick = () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', currentTheme);
  try { localStorage.setItem('kb-theme', currentTheme); } catch(e){}
  updateIcons();
};

document.getElementById('layout-toggle').onclick = () => {
  currentLayout = currentLayout === 'grid' ? 'list' : 'grid';
  document.body.classList.toggle('list-view');
  try { localStorage.setItem('kb-layout', currentLayout); } catch(e){}
  updateIcons();
};

document.getElementById('btn-filter-all').onclick = function() { filterCategory('all', this); };
document.getElementById('search-input').oninput = function() {
  currentSearch = this.value;
  render();
};

// ** บังคับรันหลายระดับเพื่อความมั่นใจ **
window.onload = init;
document.addEventListener('DOMContentLoaded', init);
setTimeout(init, 100); // ประกันสุดท้ายถ้าทุกอย่างช้า
</script>
</body>
</html>
