<head>

    /* ===== CSS VARIABLES ===== */
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text-primary: #f0f4ff;
      --text-secondary: #8b9cbf;
      --text-muted: #4a5568;
      --accent-purple: #7c3aed;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-pink: #ec4899;
      --accent-green: #10b981;
      --accent-orange: #f59e0b;
      --gradient-main: linear-gradient(135deg, #7c3aed 0%, #3b82f6 50%, #06b6d4 100%);
      --gradient-card: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(59,130,246,0.1) 100%);
      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-glow: 0 0 40px rgba(124,58,237,0.2);
      --radius-card: 16px;
      --radius-badge: 8px;
      --font-th: 'Sarabun', sans-serif;
      --font-en: 'Inter', sans-serif;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-th);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND BLOBS ===== */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: floatOrb 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: #7c3aed; top: -200px; left: -200px; animation-delay: 0s; }
    .orb-2 { width: 500px; height: 500px; background: #3b82f6; top: 40%; right: -200px; animation-delay: -7s; }
    .orb-3 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; left: 30%; animation-delay: -14s; }
    @keyframes floatOrb {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* ===== LAYOUT ===== */
    .wrapper { position: relative; z-index: 1; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ===== NAVBAR ===== */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,14,26,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-en);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      text-decoration: none;
    }
    .nav-logo-icon {
      width: 36px; height: 36px;
      background: var(--gradient-main);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .nav-search {
      flex: 1;
      max-width: 360px;
    }
    .search-box {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px 8px 40px;
      color: var(--text-primary);
      font-family: var(--font-th);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .search-wrap {
      position: relative;
    }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
    }
    .search-box:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .search-box::placeholder { color: var(--text-muted); }
    .nav-stats {
      display: flex;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-family: var(--font-en);
    }
    .nav-stat span { color: var(--text-primary); font-weight: 600; }

    /* ===== HERO ===== */
    .hero {
      padding: 72px 0 56px;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #a78bfa;
      margin-bottom: 24px;
      font-family: var(--font-en);
      letter-spacing: 0.05em;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      font-family: var(--font-en);
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .hero-tag {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-en);
    }
    .hero-tag:hover, .hero-tag.active {
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.4);
      color: #a78bfa;
    }
    .hero-tag.active { font-weight: 600; }

    /* ===== SECTION HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-en);
    }
    .section-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .section-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
      font-family: var(--font-en);
    }

    /* ===== CATEGORY SECTION ===== */
    .category-section { margin-bottom: 56px; }

    /* ===== CARDS GRID ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ===== KNOWLEDGE CARD ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-card);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow-card), var(--shadow-glow);
    }
    .card:hover::before { opacity: 1; }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-emoji {
      font-size: 1.6rem;
      flex-shrink: 0;
      line-height: 1;
    }
    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .badge {
      font-size: 0.7rem;
      font-family: var(--font-en);
      padding: 3px 8px;
      border-radius: var(--radius-badge);
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-new { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
    .badge-hot { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .badge-update { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
    .badge-star { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      position: relative;
    }
    .card-desc {
      font-size: 0.87rem;
      color: var(--text-secondary);
      line-height: 1.65;
      flex: 1;
      position: relative;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      position: relative;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card-tag {
      font-size: 0.7rem;
      font-family: var(--font-en);
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .card-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--font-en);
      white-space: nowrap;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat-icon { font-size: 1.4rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; font-family: var(--font-en); color: var(--text-primary); }
    .stat-label { font-size: 0.78rem; color: var(--text-secondary); }

    /* ===== FOOTER ===== */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-family: var(--font-en);
    }
    footer a { color: var(--accent-purple); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav-stats { display: none; }
      .hero { padding: 48px 0 36px; }
      .cards-grid { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }

    /* ===== FADE IN ANIMATION ===== */
    .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeIn 0.4s ease forwards; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }

    /* ===== HIGHLIGHT ===== */
    .highlight { background: rgba(124,58,237,0.3); border-radius: 2px; padding: 0 2px; }

    /* ===== NO RESULTS ===== */
    #no-results { display: none; text-align: center; padding: 64px 24px; }
    #no-results .big-emoji { font-size: 3rem; margin-bottom: 16px; }
    #no-results h3 { font-size: 1.2rem; margin-bottom: 8px; }
    #no-results p { color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>

];

/* =====================================================
   ⚙️ ENGINE — ไม่ต้องแก้ไขส่วนนี้
   ===================================================== */

let currentFilter = 'all';
let currentSearch = '';

// Group by category
function groupByCategory(items) {
  return items.reduce((acc, item) => {
    if (!acc[item.category]) acc[item.category] = { emoji: item.emoji, color: item.color, items: [] };
    acc[item.category].items.push(item);
    return acc;
  }, {});
}

// Badge HTML
function badgeHTML(badge) {
  if (!badge) return '';
  const map = { new: ['badge-new','NEW'], hot: ['badge-hot','🔥 HOT'], update: ['badge-update','UPDATE'], star: ['badge-star','⭐ STAR'] };
  const [cls, label] = map[badge] || ['',''];
  return `<span class="badge ${cls}">${label}</span>`;
}

// Highlight search
function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark class="highlight">$1</mark>');
}

// Format date
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
}

// Card HTML
function cardHTML(item) {
  const q = currentSearch;
  return `
    <a class="card" href="${item.link}" ${item.link !== '#' ? 'target="_blank"' : 'onclick="return false"'} id="card-${item.id}">
      <div class="card-header">
        <div class="card-emoji">${item.emoji}</div>
        <div class="card-badges">${badgeHTML(item.badge)}</div>
      </div>
      <div class="card-title">${highlight(item.title, q)}</div>
      <div class="card-desc">${highlight(item.desc, q)}</div>
      <div class="card-footer">
        <div class="card-tags">
          ${item.tags.map(t => `<span class="card-tag">${highlight(t, q)}</span>`).join('')}
        </div>
        <div class="card-date">${formatDate(item.date)}</div>
      </div>
    </a>
  `;
}

// Render
function render() {
  const q = currentSearch.toLowerCase().trim();
  let filtered = KNOWLEDGE.filter(item => {
    const matchCat = currentFilter === 'all' || item.category === currentFilter;
    const matchSearch = !q ||
      item.title.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) ||
      item.tags.some(t => t.toLowerCase().includes(q)) ||
      item.category.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const grouped = groupByCategory(filtered);
  const sections = document.getElementById('knowledge-sections');
  const noResults = document.getElementById('no-results');

  if (filtered.length === 0) {
    sections.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  sections.innerHTML = Object.entries(grouped).map(([catName, cat]) => `
    <section class="category-section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon" style="background:${cat.color}22; color:${cat.color}">${cat.emoji}</div>
          ${catName}
          <span class="section-count">${cat.items.length} หัวข้อ</span>
        </div>
      </div>
      <div class="cards-grid">
        ${cat.items.map(item => cardHTML(item)).join('')}
      </div>
    </section>
  `).join('');
}

// Build category filters
function buildFilters() {
  const cats = [...new Set(KNOWLEDGE.map(k => k.category))];
  const container = document.getElementById('category-filters');
  const catObj = groupByCategory(KNOWLEDGE);
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'hero-tag';
    btn.dataset.filter = cat;
    btn.innerHTML = `${catObj[cat].emoji} ${cat}`;
    btn.onclick = () => filterCategory(cat, btn);
    container.appendChild(btn);
  });

  // Update nav stats
  document.getElementById('total-count').textContent = KNOWLEDGE.length;
  document.getElementById('cat-count').textContent = cats.length;
}

// Build stats bar
function buildStats() {
  const cats = groupByCategory(KNOWLEDGE);
  const totalNew = KNOWLEDGE.filter(k => k.badge === 'new').length;
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-icon">📖</div>
      <div>
        <div class="stat-value">${KNOWLEDGE.length}</div>
        <div class="stat-label">หัวข้อทั้งหมด</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📂</div>
      <div>
        <div class="stat-value">${Object.keys(cats).length}</div>
        <div class="stat-label">หมวดหมู่</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✨</div>
      <div>
        <div class="stat-value">${totalNew}</div>
        <div class="stat-label">เพิ่มใหม่</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔥</div>
      <div>
        <div class="stat-value">${KNOWLEDGE.filter(k=>k.badge==='hot').length}</div>
        <div class="stat-label">กำลังฮอต</div>
      </div>
    </div>
  `;
}

// Filter by category
function filterCategory(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.hero-tag').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// Search handler
document.getElementById('search-input').addEventListener('input', function() {
  currentSearch = this.value;
  render();
});

// Last updated
document.getElementById('last-updated').textContent = (() => {
  const dates = KNOWLEDGE.map(k => k.date).filter(Boolean).sort().reverse();
  return dates[0] ? formatDate(dates[0]) : '-';
})();

// Init
buildFilters();
buildStats();
render();
</script>
</body>
</html>
